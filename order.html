<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweeter — Оформление заказа</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">🍰 Sweeter</div>
      <nav>
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="order.html">Заказ</a>
        <a href="chat.html">Чат</a>
      </nav>
    </header>

    <main>
      <div class="order-form">
        <h2>Оформление заказа</h2>
        <div class="form-group">
          <label>Ваше имя</label>
          <input type="text" id="name" placeholder="Геннадий" />
        </div>
        <div class="form-group">
          <label>Телефон</label>
          <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" />
        </div>
        <div class="form-group">
          <label>Адрес доставки</label>
          <input type="text" id="address" placeholder="Улица, дом, квартира" />
        </div>
        <div class="form-group">
          <label>Выберите товар</label>
          <select id="product">
            <option value="Медовик 1200₽">Медовик — 1200 ₽</option>
            <option value="Наполеон 1300₽">Наполеон — 1300 ₽</option>
            <option value="Красный бархат 1500₽">
              Красный бархат — 1500 ₽
            </option>
            <option value="Чизкейк 1400₽">Чизкейк — 1400 ₽</option>
          </select>
        </div>
        <div class="form-group">
          <label>Комментарий к заказу</label>
          <textarea
            rows="3"
            id="comment"
            placeholder="Пожелания, аллергии, время доставки..."
          ></textarea>
        </div>
        <button class="btn" style="width: 100%" onclick="submitOrder()">
          Подтвердить заказ
        </button>
      </div>
    </main>

    <footer>
      <p>© 2026 Sweeter — Вкусные моменты с доставкой</p>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
