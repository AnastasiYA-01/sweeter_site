<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweeter — Мой профиль</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .profile-container {
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .profile-card {
        background: white;
        border-radius: 30px;
        padding: 30px;
        margin-bottom: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      }
      .profile-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 25px;
        flex-wrap: wrap;
      }
      .profile-avatar {
        width: 80px;
        height: 80px;
        background: #ff9f8c;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        color: white;
      }
      .profile-info h2 {
        margin: 0 0 5px 0;
        text-align: left;
      }
      .info-row {
        display: flex;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
      }
      .info-label {
        width: 120px;
        font-weight: bold;
        color: #666;
      }
      .info-value {
        flex: 1;
      }
      .logout-btn {
        background: none;
        border: 1px solid #ff6b6b;
        color: #ff6b6b;
        padding: 8px 20px;
        border-radius: 30px;
        cursor: pointer;
        margin-top: 20px;
      }
      .logout-btn:hover {
        background: #ff6b6b;
        color: white;
      }
      .auth-buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-top: 20px;
      }
      .order-card {
        background: #fff5f0;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
        border-left: 5px solid #ff9f8c;
      }
      .order-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #ffd4c4;
      }
      .order-status {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
      }
      .status-new {
        background: #ffe0e0;
        color: #ff6b6b;
      }
      .status-cooking {
        background: #fff0db;
        color: #ff9f8c;
      }
      .status-delivery {
        background: #e0f0ff;
        color: #4a90e2;
      }
      .status-done {
        background: #e0ffe0;
        color: #4caf50;
      }
      .empty-orders {
        text-align: center;
        padding: 60px 20px;
      }
      .empty-icon {
        font-size: 72px;
        margin-bottom: 20px;
      }
      .empty-title {
        font-size: 24px;
        color: #4a4a4a;
        margin-bottom: 10px;
      }
      .empty-text {
        color: #999;
        margin-bottom: 25px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo" onclick="location.href = 'index.html'">🍰 Sweeter</div>
      <nav>
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="order.html" id="nav-order">Заказ</a>
        <a href="chat.html" id="nav-chat">Чат</a>
        <a href="profile.html" id="nav-profile">👤 Профиль</a>
        <div class="cart-icon" onclick="toggleCart()">
          🛒 <span id="cart-count" class="cart-count">0</span>
        </div>
      </nav>
    </header>

    <div id="cart-modal" class="cart-modal">
      <h3>🛒 Корзина</h3>
      <div class="cart-header">
        <span>Количество</span>
        <span>Товар</span>
        <span></span>
      </div>
      <div id="cart-items" class="cart-items">Корзина пуста</div>
      <div class="cart-total">
        <span>Итого:</span>
        <span id="cart-total">0</span>
        <span>₽</span>
      </div>
      <button
        class="btn cart-checkout-btn"
        onclick="location.href = 'order.html'"
      >
        Оформить заказ
      </button>
    </div>

    <main>
      <div class="profile-container" id="profile-container"></div>
    </main>

    <footer>
      <p>© 2026 Sweeter — Вкусные моменты с доставкой</p>
      <p>📞 +7 (***) ***-**-** | 📧 ***@sweeter.ru</p>
      <p>📱 VK (скоро) | 💬 Telegram (скоро)</p>
      <p style="margin-top: 10px">
        <a href="admin.html" class="admin-link">👤 администратор</a>
      </p>
    </footer>

    <script src="main.js"></script>
    <script>
      function loadProfile() {
        const currentUser = getCurrentUser();
        const container = document.getElementById("profile-container");

        // Если не авторизован — показываем кнопки входа/регистрации
        if (!currentUser) {
          container.innerHTML = `
                    <div class="profile-card" style="text-align: center;">
                        <h2>🔐 Добро пожаловать!</h2>
                        <p>Войдите или зарегистрируйтесь, чтобы видеть свои заказы и личную информацию.</p>
                        <div class="auth-buttons">
                            <button class="btn" onclick="location.href='login.html'">Войти</button>
                            <button class="btn" style="background: white; color: #FF9F8C; border: 1px solid #FF9F8C;" onclick="location.href='login.html'">Регистрация</button>
                        </div>
                    </div>
                `;
          return;
        }

        // Получаем заказы пользователя
        const allOrders = JSON.parse(
          localStorage.getItem("sweeter_orders") || "[]",
        );
        const userOrders = allOrders.filter(
          (order) =>
            order.email === currentUser.email ||
            order.phone === currentUser.phone,
        );
        userOrders.sort((a, b) => b.id - a.id);

        function getStatusClass(status) {
          switch (status) {
            case "Новый":
              return "status-new";
            case "Готовится":
              return "status-cooking";
            case "Доставляется":
              return "status-delivery";
            case "Выполнен":
              return "status-done";
            default:
              return "";
          }
        }

        // Красивая заглушка, если заказов нет
        let ordersHtml = "";
        if (userOrders.length === 0) {
          ordersHtml = `
                    <div class="empty-orders">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">Здесь пока пусто</div>
                        <div class="empty-text">
                            У вас ещё не было заказов.<br>
                            Самое время выбрать что-то вкусненькое!
                        </div>
                        <a href="catalog.html" class="btn">🍰 Перейти в каталог</a>
                    </div>
                `;
        } else {
          ordersHtml = userOrders
            .map(
              (order) => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <strong>Заказ #${order.id}</strong> | ${formatDate(order.date)}
                            </div>
                            <span class="order-status ${getStatusClass(order.status)}">${order.status}</span>
                        </div>
                        <div><strong>Состав:</strong> ${order.items.map((i) => `${i.name} x${i.quantity}`).join(", ")}</div>
                        <div><strong>Сумма:</strong> ${order.total} ₽</div>
                        <div style="font-size: 12px; color: #999;">📍 ${order.address} | 📞 ${order.phone}</div>
                        ${order.comment ? `<div style="font-size: 12px;">💬 ${order.comment}</div>` : ""}
                    </div>
                `,
            )
            .join("");
        }

        // Вся страница профиля
        container.innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar">${(currentUser.name || "А").charAt(0).toUpperCase()}</div>
                        <div class="profile-info">
                            <h2>${escapeHtml(currentUser.name)}</h2>
                            <p>${currentUser.email}</p>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">📞 Телефон</div>
                        <div class="info-value">${currentUser.phone || "Не указан"}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">📅 Дата регистрации</div>
                        <div class="info-value">${currentUser.createdAt || "—"}</div>
                    </div>
                    <button class="logout-btn" onclick="logout()">🚪 Выйти из аккаунта</button>
                </div>
                
                <div class="profile-card">
                    <h3 style="margin-bottom: 20px;">📦 Мои заказы</h3>
                    ${ordersHtml}
                </div>
            `;
      }

      document.addEventListener("DOMContentLoaded", function () {
        updateCartUI();
        updateHeader();
        loadProfile();
      });
    </script>
  </body>
</html>
