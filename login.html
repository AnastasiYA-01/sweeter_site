<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweeter — Вход и регистрация</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .auth-container {
        max-width: 450px;
        margin: 80px auto;
        background: white;
        border-radius: 30px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      .auth-tabs {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
        border-bottom: 2px solid #eee;
      }
      .auth-tab {
        cursor: pointer;
        padding: 10px 20px;
        font-size: 18px;
        font-weight: 500;
        color: #999;
        transition: all 0.2s;
      }
      .auth-tab.active {
        color: #ff9f8c;
        border-bottom: 2px solid #ff9f8c;
        margin-bottom: -2px;
      }
      .auth-form {
        display: none;
      }
      .auth-form.active {
        display: block;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #e0e0e0;
        border-radius: 16px;
        font-size: 16px;
      }
      .auth-btn {
        width: 100%;
        padding: 14px;
        font-size: 16px;
      }
      .back-link {
        text-align: center;
        margin-top: 20px;
      }
      .back-link a {
        color: #ff9f8c;
        text-decoration: none;
      }
      .forgot-link {
        text-align: right;
        margin-top: 5px;
        font-size: 12px;
      }
      .forgot-link a {
        color: #999;
        cursor: pointer;
      }
      .message {
        padding: 10px;
        border-radius: 12px;
        margin-bottom: 20px;
        text-align: center;
      }
      .error {
        background: #ffe0e0;
        color: #ff6b6b;
      }
      .success {
        background: #e0ffe0;
        color: #4caf50;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo" onclick="location.href = 'index.html'">🍰 Sweeter</div>
      <nav>
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="order.html" id="nav-order">Заказ</a>
        <a href="chat.html" id="nav-chat">Чат</a>
        <a href="profile.html" id="nav-profile">👤 Профиль</a>
        <div class="cart-icon" onclick="toggleCart()">
          🛒 <span id="cart-count" class="cart-count">0</span>
        </div>
      </nav>
    </header>

    <div id="cart-modal" class="cart-modal">
      <h3>🛒 Корзина</h3>
      <div class="cart-header">
        <span>Количество</span>
        <span>Товар</span>
        <span></span>
      </div>
      <div id="cart-items" class="cart-items">Корзина пуста</div>
      <div class="cart-total">
        <span>Итого:</span>
        <span id="cart-total">0</span>
        <span>₽</span>
      </div>
      <button
        class="btn cart-checkout-btn"
        onclick="location.href = 'order.html'"
      >
        Оформить заказ
      </button>
    </div>

    <main>
      <div class="auth-container">
        <div id="message"></div>

        <div class="auth-tabs">
          <div class="auth-tab active" onclick="switchTab('login')">Вход</div>
          <div class="auth-tab" onclick="switchTab('register')">
            Регистрация
          </div>
        </div>

        <div id="login-form" class="auth-form active">
          <div class="form-group">
            <label>📧 Email</label>
            <input
              type="email"
              id="login-email"
              placeholder="example@mail.ru"
            />
          </div>
          <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" id="login-password" placeholder="••••••" />
          </div>
          <div class="forgot-link">
            <a onclick="forgotPassword()">Забыли пароль?</a>
          </div>
          <button class="btn auth-btn" onclick="loginUser()">Войти</button>
        </div>

        <div id="register-form" class="auth-form">
          <div class="form-group">
            <label>👤 Имя</label>
            <input type="text" id="reg-name" placeholder="Анастасия" />
          </div>
          <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="reg-email" placeholder="example@mail.ru" />
          </div>
          <div class="form-group">
            <label>📞 Телефон</label>
            <input type="tel" id="reg-phone" placeholder="+7 (___) ___-__-__" />
          </div>
          <div class="form-group">
            <label>🔒 Пароль</label>
            <input
              type="password"
              id="reg-password"
              placeholder="минимум 4 символа"
            />
          </div>
          <div class="form-group">
            <label>🔒 Подтверждение пароля</label>
            <input type="password" id="reg-password2" placeholder="••••••" />
          </div>
          <button class="btn auth-btn" onclick="registerUser()">
            Зарегистрироваться
          </button>
        </div>

        <div class="back-link">
          <a href="index.html">← Вернуться на главную</a>
        </div>
      </div>
    </main>

    <footer>
      <p>© 2026 Sweeter — Вкусные моменты с доставкой</p>
      <p>📞 +7 (***) ***-**-** | 📧 ***@sweeter.ru</p>
      <p>📱 VK (скоро) | 💬 Telegram (скоро)</p>
      <p style="margin-top: 10px">
        <a href="admin.html" class="admin-link">👤 администратор</a>
      </p>
    </footer>

    <script src="main.js"></script>
    <script>
      // Функции для авторизации (без дублирования API_URL)

      function showMessage(text, isError = true) {
        const msgDiv = document.getElementById("message");
        msgDiv.innerHTML = `<div class="message ${isError ? "error" : "success"}">${text}</div>`;
        setTimeout(() => {
          msgDiv.innerHTML = "";
        }, 3000);
      }

      function switchTab(tab) {
        document
          .querySelectorAll(".auth-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".auth-form")
          .forEach((f) => f.classList.remove("active"));

        if (tab === "login") {
          document
            .querySelector(".auth-tab:first-child")
            .classList.add("active");
          document.getElementById("login-form").classList.add("active");
        } else {
          document
            .querySelector(".auth-tab:last-child")
            .classList.add("active");
          document.getElementById("register-form").classList.add("active");
        }
      }

      async function registerUser() {
        const name = document.getElementById("reg-name").value.trim();
        const email = document.getElementById("reg-email").value.trim();
        const phone = document.getElementById("reg-phone").value.trim();
        const password = document.getElementById("reg-password").value;
        const password2 = document.getElementById("reg-password2").value;

        if (!name || !email || !phone || !password) {
          showMessage("Заполните все поля!", true);
          return;
        }
        if (password !== password2) {
          showMessage("Пароли не совпадают!", true);
          return;
        }
        if (password.length < 4) {
          showMessage("Пароль должен быть не менее 4 символов", true);
          return;
        }

        try {
          const response = await fetch("http://localhost:3000/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, phone, password }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Ошибка регистрации");

          showMessage("✅ Регистрация успешна! Теперь войдите.", false);
          document.getElementById("reg-name").value = "";
          document.getElementById("reg-email").value = "";
          document.getElementById("reg-phone").value = "";
          document.getElementById("reg-password").value = "";
          document.getElementById("reg-password2").value = "";
          switchTab("login");
        } catch (error) {
          showMessage(error.message, true);
        }
      }

      async function loginUser() {
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;

        if (!email || !password) {
          showMessage("Заполните все поля!", true);
          return;
        }

        try {
          const response = await fetch("http://localhost:3000/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await response.json();
          if (!response.ok)
            throw new Error(data.error || "Неверный email или пароль");

          localStorage.setItem(
            "sweeter_current_user",
            JSON.stringify(data.user),
          );
          showMessage(`Добро пожаловать, ${data.user.name}! 🎉`, false);

          setTimeout(() => {
            window.location.href = "index.html";
          }, 1000);
        } catch (error) {
          showMessage(error.message, true);
        }
      }

      async function forgotPassword() {
        const email = prompt("Введите ваш email для восстановления пароля:");
        if (!email) return;

        try {
          const response = await fetch(
            `http://localhost:3000/api/users/${encodeURIComponent(email)}`,
          );
          const user = await response.json();

          if (!user || !user.email) {
            showMessage("Пользователь с таким email не найден", true);
            return;
          }

          showMessage(`Ваш пароль: ${user.password}`, false);
        } catch (error) {
          showMessage(
            "Ошибка при восстановлении пароля. Убедитесь, что сервер запущен.",
            true,
          );
        }
      }
    </script>
  </body>
</html>
